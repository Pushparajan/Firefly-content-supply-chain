application:
  runtimeManifest:
    packages:
      content-supply-chain:
        license: Apache-2.0
        actions:
          # ---------------------------------------------------------------
          # Main orchestration action: Workfront webhook → Firefly V3 → AEM
          # ---------------------------------------------------------------
          orchestrate:
            function: actions/orchestrate/index.js
            web: 'yes'
            runtime: 'nodejs:18'
            limits:
              # Extended timeout supports full async poll cycle (max 3600000 ms)
              timeout: 300000
              memorySize: 512
              concurrency: 50
            annotations:
              require-adobe-auth: false   # Webhook auth handled by HMAC in-action
              final: true
            include:
              - actions/orchestrate/*.js
              - lib/*.js
            environments:
              # IMS / OAuth Server-to-Server
              - AIO_IMS_CONTEXT_NAME
              - AIO_IMS_ORG_ID
              - CLIENT_ID
              - CLIENT_SECRET
              - TECHNICAL_ACCOUNT_ID
              - TECHNICAL_ACCOUNT_EMAIL
              # Firefly
              - FIREFLY_API_BASE_URL
              - BRAND_STYLE_REFERENCE_URL
              - FIREFLY_NUM_VARIATIONS
              - FIREFLY_POLL_INTERVAL_MS
              - FIREFLY_POLL_MAX_ATTEMPTS
              # AEM
              - AEM_HOST
              - AEM_UPLOAD_BASE_PATH
              - AEM_BATCH_UPLOAD_ENABLED
              # Workfront
              - WORKFRONT_BASE_URL
              - WORKFRONT_API_KEY
              - WORKFRONT_API_VERSION
              # Security
              - WORKFRONT_WEBHOOK_SECRET

          # ---------------------------------------------------------------
          # Fusion Ingest action: Content Hub agency upload → AEM Assets
          # Called by a Workfront Fusion scenario on new contribution events
          # ---------------------------------------------------------------
          fusion-ingest:
            function: actions/fusion-ingest/index.js
            web: 'yes'
            runtime: 'nodejs:18'
            limits:
              timeout: 120000
              memorySize: 512
              concurrency: 20
            annotations:
              require-adobe-auth: false   # Auth via x-fusion-secret header
              final: true
            include:
              - actions/fusion-ingest/*.js
              - lib/*.js
            environments:
              # IMS / OAuth Server-to-Server
              - AIO_IMS_CONTEXT_NAME
              - AIO_IMS_ORG_ID
              - CLIENT_ID
              - CLIENT_SECRET
              # Content Hub
              - CONTENT_HUB_HOST
              # AEM
              - AEM_HOST
              - AEM_UPLOAD_BASE_PATH
              # Security
              - FUSION_INGEST_SECRET

          # ---------------------------------------------------------------
          # Offer Sync action: AEM renditions → AJO Offer Library
          # Called (fire-and-forget) by orchestrate after AEM upload succeeds
          # ---------------------------------------------------------------
          offer-sync:
            function: actions/offer-sync/index.js
            web: 'yes'
            runtime: 'nodejs:18'
            limits:
              timeout: 120000
              memorySize: 256
              concurrency: 10
            annotations:
              require-adobe-auth: false   # Caller-secret in x-offer-sync-secret header
              final: true
            include:
              - actions/offer-sync/*.js
              - lib/*.js
            environments:
              # IMS / OAuth Server-to-Server
              - AIO_IMS_ORG_ID
              - CLIENT_ID
              - CLIENT_SECRET
              # AJO / Offer Decisioning
              - AEP_SANDBOX_NAME
              - AEM_PUBLISH_HOST
              # AEP Streaming (for XDM impression events)
              - AEP_STREAMING_INLET_URL
              - AEP_DATASET_ID
              - AEP_SCHEMA_REF
